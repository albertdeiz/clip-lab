name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cliplab
          POSTGRES_PASSWORD: cliplab
          POSTGRES_DB: cliplab
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cliplab"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://cliplab:cliplab@localhost:5432/cliplab?schema=public
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: cliplab-videos
      S3_ACCESS_KEY: cliplab
      S3_SECRET_KEY: cliplab-secret
      JWT_SECRET: ci-secret-must-be-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm typecheck
      - run: pnpm build
      # NOTA: `pnpm lint` y `pnpm test` se activan en la Iteración 1 (features)
      # cuando se añaden ESLint config + el primer set de tests.
