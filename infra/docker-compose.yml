services:
  postgres:
    image: postgres:16-alpine
    container_name: cliplab-postgres
    environment:
      POSTGRES_USER: cliplab
      POSTGRES_PASSWORD: cliplab
      POSTGRES_DB: cliplab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliplab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cliplab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cliplab-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: cliplab
      RABBITMQ_DEFAULT_PASS: cliplab
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cliplab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cliplab
      MINIO_ROOT_PASSWORD: cliplab-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crea el bucket privado al arrancar y aplica CORS + lifecycle de abort multipart.
  minio-init:
    image: minio/mc:latest
    container_name: cliplab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cliplab cliplab-secret &&
      mc mb --ignore-existing local/cliplab-videos &&
      mc anonymous set none local/cliplab-videos &&
      mc ilm rule add --expire-delete-marker local/cliplab-videos 2>/dev/null || true &&
      echo 'MinIO bucket cliplab-videos listo (privado)';
      "

volumes:
  pgdata:
  miniodata:
